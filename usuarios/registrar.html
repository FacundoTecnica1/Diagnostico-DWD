<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - DIAGNOSTCO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --verde-super: #28a745;
            --verde-oscuro: #1e7e34;
            --fondo: #f8f9fa;
        }

        body { 
            background-color: var(--fondo); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 40px 0;
        }

        .register-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 600px;
            margin: auto;
        }

        .header-registro {
            border-bottom: 2px solid var(--fondo);
            margin-bottom: 30px;
            padding-bottom: 15px;
        }

        .btn-registrar {
            background-color: var(--verde-super);
            color: white;
            border-radius: 25px;
            font-weight: bold;
            border: none;
            padding: 15px;
            width: 100%;
            transition: 0.3s;
        }

        .btn-registrar:hover {
            background-color: var(--verde-oscuro);
            color: white;
        }

        .form-label {
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #6c757d;
        }

        .form-control {
            border-radius: 10px;
            background-color: #fdfdfd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="header-registro text-center">
                <h2 class="fw-bold text-success">Crear Cuenta</h2>
                <p class="text-muted">Únete a nuestra red de clientes</p>
            </div>

            <form action="registrarse.php" method="POST" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">DNI</label>
                    <input type="text" name="dni" class="form-control" maxlength="8" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="correo" class="form-control" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="contrasena" class="form-control" required>
                </div>
                
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-registrar shadow-sm">FINALIZAR REGISTRO</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a href="login.html" class="text-muted small text-decoration-none">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
        </div>
    </div>
</body>
</html>
