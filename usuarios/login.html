<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DIAGNOSTCO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --verde-super: #28a745;
            --verde-oscuro: #1e7e34;
            --fondo: #f8f9fa;
        }

        body { 
            background-color: var(--fondo); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        .brand-icon {
            font-size: 3rem;
            color: var(--verde-super);
            margin-bottom: 20px;
        }

        .btn-ingresar {
            background-color: var(--verde-super);
            color: white;
            border-radius: 25px;
            font-weight: bold;
            border: none;
            padding: 12px;
            transition: 0.3s;
            width: 100%;
        }

        .btn-ingresar:hover {
            background-color: var(--verde-oscuro);
            color: white;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <i class="bi bi-shop-window brand-icon"></i>
        <h2 class="fw-bold mb-4">Iniciar Sesión</h2>
        
        <form action="login.php" method="POST">
            <div class="text-start">
                <label class="form-label small fw-bold text-muted text-uppercase">Correo Electrónico</label>
                <input type="email" name="correo" class="form-control" placeholder="ejemplo@test.com" required>
                
                <label class="form-label small fw-bold text-muted text-uppercase">Contraseña</label>
                <input type="password" name="contrasena" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-ingresar mt-3">INGRESAR AL SISTEMA</button>
        </form>
        
        <p class="mt-4 small text-muted">
            ¿No tienes cuenta? <a href="registrar.html" class="text-success fw-bold text-decoration-none">Regístrate aquí</a>
        </p>
    </div>
</body>
</html>
