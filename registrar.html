<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Registro de Usuario</title>
    <style>
        /* Un toque de estilo para que el usuario sepa que está haciendo algo mal */
        input:invalid {
            border: 2px solid lightcoral;
        }
        input:valid {
            border: 2px solid lightgreen;
        }
    </style>
</head>
<body>
    

    <section id="agregar">
        <h2>Registro de Nuevo Usuario</h2>
        <form id="form-agregar" class="producto-form" action="registrarse.php" method="POST">
            
            <label for="nombre">Nombre </label>
<input type="text" id="nombre" name="nombre">

<label for="apellido">Apellido </label>
<input type="text" id="apellido" name="apellido">

<label for="dni">DNI (Máximo 8 caracteres):</label>
<input type="text" id="dni" name="dni" maxlength="8" pattern="\d+" title="Máximo 8 números" required>

<label for="edad">Edad (Máximo 3 dígitos):</label>
<input type="number" id="edad" name="edad" min="1" max="999" required>
            
            <button type="submit" style="margin-top: 20px; cursor: pointer;">
                REGISTRAR USUARIO
            </button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 Supermercado Diagnostico</p>
    </footer>
</body>
</html>
